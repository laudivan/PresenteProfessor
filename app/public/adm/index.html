<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Professor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
    <style>
        .nav-tabs .nav-link {
            color: #495057;
        }

        .nav-tabs .nav-link.active {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container my-5 step-container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="card-title text-primary fw-bold mb-0">Painel do Professor</h2>
                            <a href="/" class="btn btn-outline-secondary btn-sm">Retornar ao Início</a>
                        </div>

                        <!-- Nav tabs -->
                        <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="aulas-tab" data-bs-toggle="tab" data-bs-target="#aulas"
                                    type="button" role="tab" aria-controls="aulas" aria-selected="false">Aulas</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="frequencias-tab" data-bs-toggle="tab"
                                    data-bs-target="#frequencias" type="button" role="tab" aria-controls="frequencias"
                                    aria-selected="true">Frequências</button>
                            </li>
                        </ul>

                        <!-- Tab content -->
                        <div class="tab-content" id="adminTabsContent">
                            <!-- Tab Aulas (Placeholder para futura funcionalidade) -->
                            <div class="tab-pane fade" id="aulas" role="tabpanel" aria-labelledby="aulas-tab">
                                <div class="text-center py-5">
                                    <h5 class="text-muted">Gerenciamento de Aulas</h5>
                                    <p class="text-muted small">Funcionalidade em desenvolvimento.</p>
                                </div>
                            </div>

                            <!-- Tab Frequencias -->
                            <div class="tab-pane fade show active" id="frequencias" role="tabpanel"
                                aria-labelledby="frequencias-tab">
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h4 class="mb-0 text-secondary">Listagem de Frequência</h4>
                                    <button id="btnExportar" class="btn btn-success btn-sm d-none">Exportar
                                        (Excel)</button>
                                </div>

                                <div id="loading" class="text-center my-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Carregando...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Buscando dados dos alunos...</p>
                                </div>

                                <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

                                <div class="accordion" id="studentsAccordion" style="display: none;">
                                    <!-- Student items will be injected here -->
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let globalStudentsData = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const loading = document.getElementById('loading');
            const accordion = document.getElementById('studentsAccordion');
            const errorMessage = document.getElementById('error-message');
            const btnExportar = document.getElementById('btnExportar');

            try {
                const response = await fetch('/api/students');
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || 'Erro ao buscar alunos');
                }

                globalStudentsData = result.students;

                if (globalStudentsData.length === 0) {
                    loading.style.display = 'none';
                    errorMessage.textContent = 'Nenhum aluno cadastrado ainda.';
                    errorMessage.classList.remove('d-none');
                    return;
                }

                // Sort students alphabetically by name
                globalStudentsData.sort((a, b) => {
                    const nameA = a.nome_social || a.nome;
                    const nameB = b.nome_social || b.nome;
                    return nameA.localeCompare(nameB);
                });

                globalStudentsData.forEach((student, index) => {
                    const nameToDisplay = student.nome_social ? `${student.nome_social} (${student.nome})` : student.nome;
                    const headingId = `heading${index}`;
                    const collapseId = `collapse${index}`;

                    let frequenciaHtml = '';
                    if (student.frequencia && student.frequencia.length > 0) {
                        frequenciaHtml = `
                        <ul class="list-group list-group-flush mt-3 border-top pt-2">
                            ${student.frequencia.map(f => {
                            const date = new Date(f.data_hora);
                            const formattedDate = date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                            return `<li class="list-group-item px-0 bg-transparent d-flex justify-content-between align-items-center border-0 py-1">
                                    <span>Aula: <strong>${f.codigo_verificacao}</strong></span>
                                    <span class="badge bg-secondary rounded-pill fw-normal">${formattedDate}</span>
                                </li>`;
                        }).join('')}
                        </ul>
                    `;
                    } else {
                        frequenciaHtml = '<p class="text-muted mt-3 mb-0">Nenhuma frequência registrada.</p>';
                    }

                    const itemHtml = `
                    <div class="accordion-item mb-2 border rounded">
                        <h2 class="accordion-header" id="${headingId}">
                            <button class="accordion-button collapsed rounded" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
                                <strong>${nameToDisplay}</strong>
                                <span class="ms-auto me-3 badge bg-primary rounded-pill">${student.frequencia ? student.frequencia.length : 0} presenças</span>
                            </button>
                        </h2>
                        <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headingId}" data-bs-parent="#studentsAccordion">
                            <div class="accordion-body bg-light rounded-bottom">
                                <div class="row text-muted small mb-2">
                                    <div class="col-6"><strong>Matrícula:</strong> ${student.matricula}</div>
                                    <div class="col-6 text-end"><strong>Email:</strong> ${student.email || 'Não informado'}</div>
                                </div>
                                ${frequenciaHtml}
                            </div>
                        </div>
                    </div>
                `;

                    accordion.insertAdjacentHTML('beforeend', itemHtml);
                });

                loading.style.display = 'none';
                accordion.style.display = 'block';
                btnExportar.classList.remove('d-none'); // Show export button now that data is loaded

            } catch (error) {
                console.error('Fetch error:', error);
                loading.style.display = 'none';
                errorMessage.textContent = error.message || 'Erro ao carregar a lista de alunos.';
                errorMessage.classList.remove('d-none');
            }

            // Exportar functionality
            btnExportar.addEventListener('click', () => {
                if (!globalStudentsData || globalStudentsData.length === 0) return;

                // 1. Coletar todas as datas únicas (no formato DD/MM/YYYY)
                const uniqueDatesSet = new Set();
                globalStudentsData.forEach(student => {
                    if (student.frequencia) {
                        student.frequencia.forEach(f => {
                            const dateObj = new Date(f.data_hora);
                            const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            uniqueDatesSet.add(dateStr);
                        });
                    }
                });

                // Ordenar as datas (opcional, requer conversão para Date, aqui mantemos a inserção ou ordem string dependendo do gosto. 
                // Para simplificar vamos ordenar pelo formato YYYY/MM/DD internamente e depois reverter)
                const sortedUniqueDates = Array.from(uniqueDatesSet).sort((a, b) => {
                    const [dayA, monthA, yearA] = a.split('/');
                    const [dayB, monthB, yearB] = b.split('/');
                    return new Date(`${yearA}-${monthA}-${dayA}`) - new Date(`${yearB}-${monthB}-${dayB}`);
                });

                // 2. Montar cabeçalho do CSV
                const header = ['Matrícula', 'Nome', 'Nome Social', ...sortedUniqueDates];

                // 3. Montar as linhas
                const rows = [];
                globalStudentsData.forEach(student => {
                    const row = [
                        student.matricula,
                        `"${student.nome}"`,
                        `"${student.nome_social || ''}"`
                    ];

                    // Mapeia quais datas o aluno tem presença
                    const studentPresentDates = new Set();
                    if (student.frequencia) {
                        student.frequencia.forEach(f => {
                            const dateObj = new Date(f.data_hora);
                            const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            studentPresentDates.add(dateStr);
                        });
                    }

                    // Preencher colunas de data
                    sortedUniqueDates.forEach(date => {
                        if (studentPresentDates.has(date)) {
                            row.push('presente');
                        } else {
                            row.push('faltou');
                        }
                    });

                    rows.push(row.join(';'));
                });

                // 4. Preparar BOM utf-8 para Excel e montar arquivo final
                const bom = "\uFEFF";
                const csvContent = bom + header.join(';') + "\n" + rows.join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = `frequencias_export_${new Date().getTime()}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });
        });
    </script>

</body>

</html>
