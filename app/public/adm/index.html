<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - Professor</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../style.css">
    <style>
        .nav-tabs .nav-link {
            color: #495057;
        }

        .nav-tabs .nav-link.active {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>

<body class="bg-light">

    <div class="container my-5 step-container">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h2 class="card-title text-primary fw-bold mb-0">Painel do Professor</h2>
                        </div>

                        <!-- Login Section -->
                        <div id="loginSection" class="text-center my-4">
                            <form id="loginForm" class="mx-auto" style="max-width: 300px;">
                                <div class="mb-3 text-start">
                                    <label class="form-label text-muted">Usuário</label>
                                    <input type="text" class="form-control" id="loginUser" required>
                                </div>
                                <div class="mb-4 text-start">
                                    <label class="form-label text-muted">Senha</label>
                                    <input type="password" class="form-control" id="loginPassword" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mb-2">Entrar</button>
                            </form>
                        </div>

                        <!-- Dashboard Section -->
                        <div id="dashboardSection" style="display: none;">
                            <!-- Nav tabs -->
                            <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="aulas-tab" data-bs-toggle="tab" data-bs-target="#aulas"
                                        type="button" role="tab" aria-controls="aulas"
                                        aria-selected="false">Aulas</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="frequencias-tab" data-bs-toggle="tab"
                                        data-bs-target="#frequencias" type="button" role="tab"
                                        aria-controls="frequencias" aria-selected="true">Frequências</button>
                                </li>
                            </ul>

                            <!-- Tab content -->
                            <div class="tab-content" id="adminTabsContent">
                                <!-- Tab Aulas -->
                                <div class="tab-pane fade" id="aulas" role="tabpanel" aria-labelledby="aulas-tab">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h4 class="mb-0 text-secondary">Gerenciamento de Aulas</h4>
                                        <button id="btnNovaAula" class="btn btn-primary btn-sm">Nova Aula</button>
                                    </div>

                                    <div id="loadingAulas" class="text-center my-4">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Carregando...</span>
                                        </div>
                                    </div>

                                    <div class="table-responsive" id="tableAulasContainer" style="display: none;">
                                        <table class="table table-hover align-middle">
                                            <thead class="table-light">
                                                <tr>
                                                    <th>Código</th>
                                                    <th>Data</th>
                                                    <th>Status</th>
                                                    <th class="text-end">Aberta</th>
                                                </tr>
                                            </thead>
                                            <tbody id="tbodyAulas">
                                                <!-- Rows will be injected here -->
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <!-- Tab Frequencias -->
                                <div class="tab-pane fade show active" id="frequencias" role="tabpanel"
                                    aria-labelledby="frequencias-tab">
                                    <div class="d-flex justify-content-between align-items-center mb-3">
                                        <h4 class="mb-0 text-secondary">Listagem de Frequência</h4>
                                        <div>
                                            <button id="btnCopiarEmails"
                                                class="btn btn-outline-primary btn-sm me-2 d-none">Copiar
                                                Emails</button>
                                            <button id="btnExportar" class="btn btn-success btn-sm d-none">Exportar
                                                (Excel)</button>
                                        </div>
                                    </div>

                                    <div id="loading" class="text-center my-4">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Carregando...</span>
                                        </div>
                                        <p class="mt-2 text-muted">Buscando dados dos alunos...</p>
                                    </div>

                                    <div id="error-message" class="alert alert-danger d-none" role="alert"></div>

                                    <div class="accordion" id="studentsAccordion" style="display: none;">
                                        <!-- Student items will be injected here -->
                                    </div>
                                </div>
                            </div> <!-- end adminTabsContent -->
                        </div> <!-- end dashboardSection -->

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast for Notifications -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="actionToast" class="toast align-items-center text-bg-success border-0" role="alert"
            aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body" id="toastMessage">
                    Ação realizada com sucesso.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let globalStudentsData = [];
        let toastComponent;

        // Function to show toast
        function showToast(message, isError = false) {
            const toastEl = document.getElementById('actionToast');
            document.getElementById('toastMessage').textContent = message;

            if (isError) {
                toastEl.classList.remove('text-bg-success');
                toastEl.classList.add('text-bg-danger');
            } else {
                toastEl.classList.remove('text-bg-danger');
                toastEl.classList.add('text-bg-success');
            }

            if (!toastComponent) {
                toastComponent = new bootstrap.Toast(toastEl);
            }
            toastComponent.show();
        }

        // --- Aulas Logic ---
        async function loadAulas() {
            const loading = document.getElementById('loadingAulas');
            const container = document.getElementById('tableAulasContainer');
            const tbody = document.getElementById('tbodyAulas');

            loading.style.display = 'block';
            container.style.display = 'none';
            tbody.innerHTML = '';

            try {
                const token = sessionStorage.getItem('adminToken');
                const response = await fetch('/api/aulas', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401 || response.status === 403) {
                    sessionStorage.removeItem('adminToken');
                    location.reload();
                    return;
                }
                const result = await response.json();

                if (!result.success) throw new Error(result.message);

                result.aulas.forEach(aula => {
                    // Convert date to DD/MM/YYYY for UI
                    const [year, month, day] = aula.data.split('-');
                    const displayDate = `${day}/${month}/${year}`;

                    const badgeClass = aula.aberta ? 'bg-success' : 'bg-secondary';
                    const badgeText = aula.aberta ? 'Aberta' : 'Fechada';

                    const isChecked = aula.aberta ? 'checked' : '';

                    const row = `
                        <tr>
                            <td><strong>${aula.codigo}</strong></td>
                            <td>${displayDate}</td>
                            <td><span class="badge ${badgeClass}" id="badge-${aula.codigo}">${badgeText}</span></td>
                            <td class="text-end">
                                <div class="form-check form-switch d-inline-block">
                                    <input class="form-check-input switch-aula-status" type="checkbox" role="switch" 
                                        id="switch-${aula.codigo}" data-codigo="${aula.codigo}" ${isChecked}>
                                </div>
                            </td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });

                // Attach event listeners to new switches
                document.querySelectorAll('.switch-aula-status').forEach(switchEl => {
                    switchEl.addEventListener('change', async (e) => {
                        const codigo = e.target.getAttribute('data-codigo');
                        const isOpen = e.target.checked;

                        // Optimistic UI Update locally, handle revert if API fails
                        const badge = document.getElementById(`badge-${codigo}`);
                        if (isOpen) {
                            badge.textContent = 'Aberta';
                            badge.className = 'badge bg-success';
                        } else {
                            badge.textContent = 'Fechada';
                            badge.className = 'badge bg-secondary';
                        }

                        try {
                            const token = sessionStorage.getItem('adminToken');
                            const updateResponse = await fetch(`/api/aulas/${codigo}/status`, {
                                method: 'PUT',
                                headers: {
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${token}`
                                },
                                body: JSON.stringify({ aberta: isOpen })
                            });
                            if (updateResponse.status === 401 || updateResponse.status === 403) {
                                sessionStorage.removeItem('adminToken');
                                location.reload();
                                return;
                            }
                            const updateResult = await updateResponse.json();

                            if (!updateResult.success) throw new Error(updateResult.message);
                            showToast(`Status da aula ${codigo} atualizado.`);
                        } catch (err) {
                            console.error(err);
                            showToast('Erro ao atualizar status.', true);
                            // Revert switch to previous state
                            e.target.checked = !isOpen;
                            if (!isOpen) { // Rever to Open
                                badge.textContent = 'Aberta';
                                badge.className = 'badge bg-success';
                            } else {      // Revert to closed
                                badge.textContent = 'Fechada';
                                badge.className = 'badge bg-secondary';
                            }
                        }
                    });
                });

                loading.style.display = 'none';
                container.style.display = 'block';

            } catch (err) {
                console.error(err);
                showToast('Erro ao carregar aulas.', true);
                loading.style.display = 'none';
            }
        }

        document.getElementById('btnNovaAula').addEventListener('click', async () => {
            const btn = document.getElementById('btnNovaAula');
            const originalText = btn.textContent;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Criando...';
            btn.disabled = true;

            try {
                const token = sessionStorage.getItem('adminToken');
                const response = await fetch('/api/aulas', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401 || response.status === 403) {
                    sessionStorage.removeItem('adminToken');
                    location.reload();
                    return;
                }
                const result = await response.json();

                if (!result.success) throw new Error(result.message);

                showToast(`Nova aula criada! Código: ${result.aula.codigo}`);
                await loadAulas(); // Reload the list
            } catch (err) {
                console.error(err);
                showToast('Erro ao criar aula.', true);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        });

        // --- Frequencia Logic ---
        async function loadStudents() {
            const loading = document.getElementById('loading');
            const accordion = document.getElementById('studentsAccordion');
            const errorMessage = document.getElementById('error-message');
            const btnExportar = document.getElementById('btnExportar');
            const btnCopiarEmails = document.getElementById('btnCopiarEmails');

            accordion.innerHTML = '';

            try {
                const token = sessionStorage.getItem('adminToken');
                const response = await fetch('/api/students', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.status === 401 || response.status === 403) {
                    sessionStorage.removeItem('adminToken');
                    location.reload();
                    return;
                }
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || 'Erro ao buscar alunos');
                }

                globalStudentsData = result.students;

                if (globalStudentsData.length === 0) {
                    loading.style.display = 'none';
                    errorMessage.textContent = 'Nenhum aluno cadastrado ainda.';
                    errorMessage.classList.remove('d-none');
                    return;
                }

                // Sort students alphabetically by name
                globalStudentsData.sort((a, b) => {
                    const nameA = a.nome_social || a.nome;
                    const nameB = b.nome_social || b.nome;
                    return nameA.localeCompare(nameB);
                });

                globalStudentsData.forEach((student, index) => {
                    const nameToDisplay = student.nome_social ? `${student.nome_social} (${student.nome})` : student.nome;
                    const headingId = `heading${index}`;
                    const collapseId = `collapse${index}`;

                    let frequenciaHtml = '';
                    if (student.frequencia && student.frequencia.length > 0) {
                        frequenciaHtml = `
                        <ul class="list-group list-group-flush mt-3 border-top pt-2">
                            ${student.frequencia.map(f => {
                            const date = new Date(f.data_hora);
                            const formattedDate = date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                            return `<li class="list-group-item px-0 bg-transparent d-flex justify-content-between align-items-center border-0 py-1">
                                    <span>Aula: <strong>${f.codigo_verificacao}</strong></span>
                                    <span class="badge bg-secondary rounded-pill fw-normal">${formattedDate}</span>
                                </li>`;
                        }).join('')}
                        </ul>
                    `;
                    } else {
                        frequenciaHtml = '<p class="text-muted mt-3 mb-0">Nenhuma frequência registrada.</p>';
                    }

                    const itemHtml = `
        <div class="accordion-item mb-2 border rounded">
            <h2 class="accordion-header" id="${headingId}">
                <button class="accordion-button collapsed rounded" type="button" data-bs-toggle="collapse" data-bs-target="#${collapseId}" aria-expanded="false" aria-controls="${collapseId}">
                    <strong>${nameToDisplay}</strong>
                    <span class="ms-auto me-3 badge bg-primary rounded-pill">${student.frequencia ? student.frequencia.length : 0} presenças</span>
                </button>
            </h2>
            <div id="${collapseId}" class="accordion-collapse collapse" aria-labelledby="${headingId}" data-bs-parent="#studentsAccordion">
                <div class="accordion-body bg-light rounded-bottom">
                    <div class="row text-muted small mb-2">
                        <div class="col-6"><strong>Matrícula:</strong> ${student.matricula}</div>
                        <div class="col-6 text-end"><strong>Email:</strong> ${student.email ? `<a href="mailto:${student.email}">${student.email}</a>` : 'Não informado'}</div>
                    </div>
                    ${frequenciaHtml}
                </div>
            </div>
        </div>
        `;

                    accordion.insertAdjacentHTML('beforeend', itemHtml);
                });

                loading.style.display = 'none';
                accordion.style.display = 'block';
                btnExportar.classList.remove('d-none'); // Show export button now that data is loaded
                btnCopiarEmails.classList.remove('d-none');

            } catch (error) {
                console.error('Fetch error:', error);
                loading.style.display = 'none';
                errorMessage.textContent = error.message || 'Erro ao carregar a lista de alunos.';
                errorMessage.classList.remove('d-none');
            }

            // Exportar functionality
            btnExportar.addEventListener('click', () => {
                if (!globalStudentsData || globalStudentsData.length === 0) return;

                // 1. Coletar todas as datas únicas (no formato DD/MM/YYYY)
                const uniqueDatesSet = new Set();
                globalStudentsData.forEach(student => {
                    if (student.frequencia) {
                        student.frequencia.forEach(f => {
                            const dateObj = new Date(f.data_hora);
                            const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            uniqueDatesSet.add(dateStr);
                        });
                    }
                });

                // Ordenar as datas (opcional, requer conversão para Date, aqui mantemos a inserção ou ordem string dependendo do gosto. 
                // Para simplificar vamos ordenar pelo formato YYYY/MM/DD internamente e depois reverter)
                const sortedUniqueDates = Array.from(uniqueDatesSet).sort((a, b) => {
                    const [dayA, monthA, yearA] = a.split('/');
                    const [dayB, monthB, yearB] = b.split('/');
                    return new Date(`${yearA}-${monthA}-${dayA}`) - new Date(`${yearB}-${monthB}-${dayB}`);
                });

                // 2. Montar cabeçalho do CSV
                const header = ['Matrícula', 'Nome', 'Nome Social', 'Email', ...sortedUniqueDates];

                // 3. Montar as linhas
                const rows = [];
                globalStudentsData.forEach(student => {
                    const row = [
                        student.matricula,
                        `"${student.nome}"`,
                        `"${student.nome_social || ''}"`,
                        `"${student.email || ''}"`
                    ];

                    // Mapeia quais datas o aluno tem presença
                    const studentPresentDates = new Set();
                    if (student.frequencia) {
                        student.frequencia.forEach(f => {
                            const dateObj = new Date(f.data_hora);
                            const dateStr = dateObj.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
                            studentPresentDates.add(dateStr);
                        });
                    }

                    // Preencher colunas de data
                    sortedUniqueDates.forEach(date => {
                        if (studentPresentDates.has(date)) {
                            row.push('presente');
                        } else {
                            row.push('faltou');
                        }
                    });

                    rows.push(row.join(';'));
                });

                // 4. Preparar BOM utf-8 para Excel e montar arquivo final
                const bom = "\uFEFF";
                const csvContent = bom + header.join(';') + "\n" + rows.join('\n');

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href = url;
                a.download = `frequencias_export_${new Date().getTime()}.csv`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            });

            // Copy Emails functionality
            btnCopiarEmails.addEventListener('click', async () => {
                if (!globalStudentsData || globalStudentsData.length === 0) return;

                const emails = globalStudentsData
                    .map(student => student.email)
                    .filter(email => email) // Removes null/undefined/empty strings
                    .join(', ');

                if (!emails) {
                    showToast('Nenhum email para copiar.', true);
                    return;
                }

                try {
                    await navigator.clipboard.writeText(emails);
                    showToast('Emails copiados para a área de transferência!');
                } catch (err) {
                    console.error('Failed to copy emails: ', err);

                    // Fallback for older browsers
                    const textArea = document.createElement("textarea");
                    textArea.value = emails;

                    // Avoid scrolling to bottom
                    textArea.style.top = "0";
                    textArea.style.left = "0";
                    textArea.style.position = "fixed";

                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();

                    try {
                        const successful = document.execCommand('copy');
                        if (successful) {
                            showToast('Emails copiados para a área de transferência!');
                        } else {
                            showToast('Erro ao copiar emails.', true);
                        }
                    } catch (fallbackErr) {
                        console.error('Fallback: Oops, unable to copy', fallbackErr);
                        showToast('Erro ao copiar emails.', true);
                    }

                    document.body.removeChild(textArea);
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const token = sessionStorage.getItem('adminToken');
            const loginSection = document.getElementById('loginSection');
            const dashboardSection = document.getElementById('dashboardSection');
            const loginForm = document.getElementById('loginForm');

            if (token) {
                // User appears logged in, show dashboard and initialize data
                loginSection.style.display = 'none';
                dashboardSection.style.display = 'block';

                loadAulas();
                loadStudents();
            } else {
                // Not logged in, leave login up
                loginSection.style.display = 'block';
                dashboardSection.style.display = 'none';
            }

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const user = document.getElementById('loginUser').value;
                const pass = document.getElementById('loginPassword').value;
                const submitBtn = loginForm.querySelector('button[type="submit"]');

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Entrando...';

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user, password: pass })
                    });
                    const result = await response.json();

                    if (!result.success) throw new Error(result.message);

                    sessionStorage.setItem('adminToken', result.token);

                    // Show Dashboard
                    loginSection.style.display = 'none';
                    dashboardSection.style.display = 'block';

                    loadAulas();
                    loadStudents();
                    showToast('Login realizado com sucesso.');
                } catch (err) {
                    console.error(err);
                    showToast('Falha no login: Credenciais inválidas.', true);
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Entrar';
                }
            });
        });
    </script>

</body>

</html>
